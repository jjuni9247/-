<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX 패밀리 · 사업 파이프라인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--surface:#fff;--border:#E8E5DF;--border2:#F0EDE8;
  --text:#1A1917;--text2:#6B6860;--text3:#A09D97;
  --red:#C0392B;--red-bg:#FBF0EF;
  --amber:#A05C00;--amber-bg:#FDF4E7;--amber-mid:#F0C070;
  --green:#2E6B35;--green-bg:#EEF6EF;--green-mid:#7DC98A;
  --blue:#1A4F8A;--blue-bg:#EEF3FB;
  --r:10px;
}
html,body{min-height:100%;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.shell{max-width:880px;margin:0 auto;padding:20px 16px 60px}

/* 헤더 */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.hdr-sub{font-size:11px;color:var(--text3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green-mid);flex-shrink:0}
.sdot.err{background:var(--red)}.sdot.loading{background:var(--amber-mid);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .14s}
.sync-btn:hover{border-color:#C0BDB6;color:var(--text)}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.vbtns{display:flex;gap:4px;flex-shrink:0}
.vbtn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .14s}
.vbtn:hover{border-color:#C0BDB6}
.vbtn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .14s}
.kpi:hover{border-color:#C0BDB6;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.kpi.on{border-color:var(--text);box-shadow:0 0 0 1px var(--text)}
.kpi-n{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kpi-l{font-size:10px;color:var(--text3);margin-top:3px}
.c-all{color:var(--blue)}.c-bid{color:var(--blue)}.c-red{color:var(--red)}.c-amb{color:var(--amber)}.c-pnd{color:var(--text2)}

/* 툴바 */
.toolbar{display:flex;gap:7px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.search{width:100%;padding:7px 10px 7px 32px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-family:inherit;color:var(--text);outline:none}
.search:focus{border-color:#B0ADA8}
.sort-sel{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}

/* 칩 */
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.chip{font-size:11px;padding:3px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.chip:hover{border-color:#C0BDB6}
.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.chip-sep{width:1px;height:15px;background:var(--border);flex-shrink:0}
.rcount{font-size:11px;color:var(--text3);margin-left:auto}

/* 카드 */
.cards{display:flex;flex-direction:column;gap:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px 12px 18px;display:grid;grid-template-columns:1fr auto;gap:2px 12px;position:relative;overflow:hidden;transition:border-color .12s,box-shadow .12s}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
.card.urg::before{background:var(--red)}
.card.soon::before{background:var(--amber-mid)}
.card.ok::before{background:var(--green-mid)}
.card.nobid{opacity:.6}
.card:hover{border-color:#C8C5BE;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:500;line-height:1.45;grid-column:1}
.card-meta{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;grid-column:1}
.card-right{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding-top:1px;min-width:52px}
.dday{font-size:20px;font-weight:700;line-height:1;letter-spacing:-.5px}
.dday.red{color:var(--red)}.dday.amber{color:var(--amber)}.dday.green{color:var(--green)}
.dday-dl{font-size:10px;color:var(--text3);text-align:right;margin-top:2px}
.card-note{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.5;grid-column:1;border-left:2px solid var(--border2);padding-left:8px}
.card-link{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#3B7DD8;text-decoration:none;margin-top:4px;grid-column:1;max-width:340px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card-link:hover{text-decoration:underline}

/* 뱃지 */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ax{background:#EEEDFE;color:#3C3489}.b-su{background:#E2F5EC;color:#0A4F2E}
.b-go{background:#E6F1FB;color:#0C447C}.b-dx{background:#FDF3E3;color:#7A4A00}
.b-dn{background:#FEE9EC;color:#8B1F2F}.b-bx{background:#F0EFFE;color:#4A3A8A}
.b-ep{background:#E8F5E9;color:#1B5E20}.b-ct{background:#F3EDE8;color:#5C3D2E}
.b-bid{background:#E6F1FB;color:#0C447C}.b-nobid{background:#F2F0EB;color:#6B6860}
.b-pend{background:#FDF4E7;color:#7A4A00}.b-mj{background:#F2F0EB;color:#6B6860}
.b-own{background:var(--bg);color:var(--text2);border:1px solid var(--border)}

/* 칸반 */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.lane{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px}
.lane-hdr{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--border)}
.lane-cnt{font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--text3)}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 10px 9px 12px;margin-bottom:5px;font-size:12px;line-height:1.4;position:relative}
.kcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.kcard.urg::before{background:var(--red)}.kcard.soon::before{background:var(--amber-mid)}.kcard.ok::before{background:var(--green-mid)}
.kcard-meta{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.kcard-foot{font-size:10px;color:var(--text3);margin-top:5px;display:flex;justify-content:space-between;align-items:center}
.kcard-dd{font-size:13px;font-weight:700}

/* 타임라인 */
.tl-group{margin-bottom:16px}
.tl-hdr{display:flex;align-items:center;gap:8px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.tl-date{font-size:12px;font-weight:500;color:var(--text2)}
.tl-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
.tl-pill.red{background:var(--red-bg);color:var(--red)}
.tl-pill.amber{background:var(--amber-bg);color:var(--amber)}
.tl-pill.green{background:var(--green-bg);color:var(--green)}
.tl-cnt{font-size:10px;color:var(--text3)}
.tl-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border2)}
.tl-row:last-child{border:none}
.tl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-dot.red{background:var(--red)}.tl-dot.amber{background:var(--amber-mid)}.tl-dot.green{background:var(--green-mid)}
.tl-body{flex:1;font-size:12.5px;line-height:1.45}
.tl-meta{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}

/* 로딩/에러 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 0;color:var(--text3)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite}
.err-box{background:var(--red-bg);border:1px solid #F5C0BB;border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--red);margin-bottom:14px}
.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:13px}

@media(max-width:600px){.kpis{grid-template-columns:repeat(3,1fr)}.kanban{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">AX 패밀리 · 사업 파이프라인</div>
      <div class="hdr-meta">
        <div class="sdot" id="sdot"></div>
        <span class="hdr-sub" id="hdr-sub">로딩 중...</span>
        <button class="sync-btn" onclick="load()">
          <svg id="sico" width="11" height="11" viewBox="0 0 16 16" fill="none">
            <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 2l2.5 2.5L8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>
    <div class="vbtns">
      <button class="vbtn on" onclick="setView('card',this)">카드</button>
      <button class="vbtn" onclick="setView('kanban',this)">칸반</button>
      <button class="vbtn" onclick="setView('timeline',this)">타임라인</button>
    </div>
  </div>

  <div id="err-area"></div>
  <div class="kpis" id="kpis"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#1A1917" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input class="search" id="q" placeholder="사업명·메모·담당자 검색..." oninput="render()">
    </div>
    <select class="sort-sel" id="sort" onchange="render()">
      <option value="dd">D-Day 순</option>
      <option value="co">회사별</option>
      <option value="bid">Bid 우선</option>
    </select>
  </div>
  <div class="chips" id="chips"></div>
  <div id="main"><div class="loading-wrap"><div class="spinner"></div><span>구글 시트 연동 중...</span></div></div>

</div>
<script>
// ── 구글 시트 CSV URL ──────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTeoVuUqrQhi4HX04Gcoy_uTZEdW0rAwcaQnlFznSBXerm6l0eLU1vibmQlfQu1nwmMJPutT2Rw5Kw7/pub?gid=294923006&single=true&output=csv';
// ────────────────────────────────────────────────────

const CO_MAP = {
  '1. AX':'AX','AX':'AX','AX+스킨아카이브':'AX',
  '2. 수주에이아이':'수주AI','수주에이아이':'수주AI','수주AI':'수주AI',
  '3. 디렉터즈':'디렉터즈','디렉터즈':'디렉터즈',
  '4. 돈맥에이아이':'돈맥AI','돈맥에이아이':'돈맥AI','돈맥AI':'돈맥AI',
  '5. 공공에이아이':'공공AI','공공에이아이':'공공AI','공공AI':'공공AI',
  '6. BX':'BX','BX':'BX',
  '7. 에픽라이즈':'에픽라이즈','에픽라이즈':'에픽라이즈',
  '8. 시트리앙하우스':'시트리앙','시트리앙하우스':'시트리앙',
};
const VALID = new Set(['AX','수주AI','디렉터즈','돈맥AI','공공AI','BX','에픽라이즈','시트리앙']);
const CO_CLS = {AX:'b-ax',수주AI:'b-su',공공AI:'b-go',디렉터즈:'b-dx',돈맥AI:'b-dn',BX:'b-bx',에픽라이즈:'b-ep',시트리앙:'b-ct'};
const BID_CLS = {Bid:'b-bid',NoBid:'b-nobid',Pending:'b-pend',미정:'b-mj'};

let D=[], view='card', kpiF=null, coF='전체', bidF='전체';

function ddCls(d){return d<=3?'red':d<=7?'amber':'green'}
function cardCls(d){return d<=3?'urg':d<=7?'soon':'ok'}
function host(u){try{return new URL(u).hostname.replace(/^www\./,'')}catch{return''}}
function cb(co){return`<span class="badge ${CO_CLS[co]||'b-mj'}">${co}</span>`}
function bb(bid){return`<span class="badge ${BID_CLS[bid]||'b-mj'}">${bid}</span>`}
function ob(o){return o?`<span class="badge b-own">${o}</span>`:''}

function setView(v,btn){view=v;document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
function setKpi(k){kpiF=kpiF===k?null:k;buildKpis();render()}
function setCo(v){coF=v;buildChips();render()}
function setBid(v){bidF=v;buildChips();render()}

function setStatus(state,msg){
  document.getElementById('sdot').className='sdot'+(state==='ok'?'':state==='err'?' err':' loading');
  document.getElementById('hdr-sub').textContent=msg;
  document.getElementById('sico').className=state==='loading'?'spin':'';
}

// CSV 파싱 (따옴표 처리 포함)
function parseCSV(text){
  const lines=text.split('\n');
  const headers=parseLine(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const cols=parseLine(lines[i]);
    const row={};
    headers.forEach((h,j)=>row[h.trim()]=cols[j]||'');
    rows.push(row);
  }
  return rows;
}
function parseLine(line){
  const cols=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(c===','&&!inQ){cols.push(cur);cur=''}
    else cur+=c;
  }
  cols.push(cur);
  return cols;
}

function findCol(headers, ...candidates){
  for(const c of candidates){
    const h=headers.find(h=>h.trim()===c||h.trim().includes(c));
    if(h)return h;
  }
  return null;
}

async function load(){
  setStatus('loading','구글 시트 불러오는 중...');
  document.getElementById('err-area').innerHTML='';
  document.getElementById('sico').className='spin';

  try{
    // CORS 프록시 사용
    const PROXY='https://corsproxy.io/?';
    const res=await fetch(PROXY+encodeURIComponent(CSV_URL));
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(!text||text.length<10)throw new Error('빈 데이터');

    const rows=parseCSV(text);
    if(!rows.length)throw new Error('데이터 없음');

    const headers=Object.keys(rows[0]);
    const colCo=findCol(headers,'기업명');
    const colTitle=findCol(headers,'사업명');
    const colBid=findCol(headers,'비드/노비드','Bid여부','bid');
    const colStage=findCol(headers,'진행 단계','진행단계');
    const colDl=findCol(headers,'작업 마감일','마감일');
    const colDday=findCol(headers,'D-Day','D_Day','d-day');
    const colLink=findCol(headers,'공고 정보(링크)','공고링크','링크');
    const colNote=findCol(headers,'진행 메모','메모','note');
    const colOwner1=findCol(headers,'담당자');
    const colOwner2=findCol(headers,'담당자 2');
    const colOwner3=findCol(headers,'담당자 3');

    D=[];
    for(const r of rows){
      const rawCo=(r[colCo]||'').trim();
      const co=CO_MAP[rawCo]||rawCo;
      const title=(r[colTitle]||'').trim();
      if(!co||!title||!VALID.has(co))continue;
      const dd=parseInt(r[colDday]);
      if(isNaN(dd))continue;
      const owners=[r[colOwner1],r[colOwner2],r[colOwner3]]
        .map(o=>(o||'').trim()).filter(o=>o&&o!=='nan').join(', ');
      D.push({
        co, title,
        bid:(r[colBid]||'미정').trim(),
        stage:(r[colStage]||'미정').trim(),
        dl:(r[colDl]||'').slice(0,10),
        dd,
        link:(r[colLink]||'').trim(),
        note:(r[colNote]||'').trim(),
        owner:owners
      });
    }

    const now=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    setStatus('ok',`${D.length}건 · ${now} 업데이트`);
    buildKpis();buildChips();render();
  }catch(e){
    setStatus('err','연동 실패 — 새로고침 버튼으로 재시도');
    document.getElementById('err-area').innerHTML=`<div class="err-box"><b style="display:block;margin-bottom:4px">⚠️ 데이터 로드 실패</b>${e.message}<br><br>구글 시트가 "웹에 게시" 상태인지 확인해 주세요.</div>`;
    document.getElementById('main').innerHTML='<div class="empty">데이터를 불러올 수 없습니다</div>';
  }
}

function filtered(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const sort=document.getElementById('sort').value;
  let arr=D.filter(d=>{
    if(kpiF==='urg'&&d.dd>3)return false;
    if(kpiF==='soon'&&!(d.dd>3&&d.dd<=7))return false;
    if(kpiF==='bid'&&d.bid!=='Bid')return false;
    if(kpiF==='pend'&&d.bid!=='Pending')return false;
    if(coF!=='전체'&&d.co!==coF)return false;
    if(bidF!=='전체'&&d.bid!==bidF)return false;
    if(q&&![d.title,d.note,d.owner,d.co].some(s=>(s||'').toLowerCase().includes(q)))return false;
    return true;
  });
  if(sort==='dd')arr.sort((a,b)=>a.dd-b.dd);
  else if(sort==='co')arr.sort((a,b)=>a.co.localeCompare(b.co,'ko')||a.dd-b.dd);
  else arr.sort((a,b)=>(b.bid==='Bid'?1:0)-(a.bid==='Bid'?1:0)||a.dd-b.dd);
  return arr;
}

function buildKpis(){
  if(!D.length){document.getElementById('kpis').innerHTML='';return}
  const bid=D.filter(d=>d.bid==='Bid').length;
  const urg=D.filter(d=>d.dd<=3&&d.bid==='Bid').length;
  const soon=D.filter(d=>d.dd>3&&d.dd<=7&&d.bid==='Bid').length;
  const pend=D.filter(d=>d.bid==='Pending').length;
  document.getElementById('kpis').innerHTML=[
    {k:null,n:D.length,l:'전체',c:'c-all'},
    {k:'bid',n:bid,l:'Bid 진행',c:'c-bid'},
    {k:'urg',n:urg,l:'긴급 D-3↓',c:'c-red'},
    {k:'soon',n:soon,l:'임박 D-7↓',c:'c-amb'},
    {k:'pend',n:pend,l:'Pending',c:'c-pnd'},
  ].map(x=>`<div class="kpi${kpiF===x.k?' on':''}" onclick="setKpi(${x.k===null?'null':`'${x.k}'`})">
    <div class="kpi-n ${x.c}">${x.n}</div><div class="kpi-l">${x.l}</div></div>`).join('');
}

function buildChips(){
  const cos=['전체',...[...new Set(D.map(d=>d.co))].sort((a,b)=>a.localeCompare(b,'ko'))];
  const bids=['전체','Bid','NoBid','Pending'];
  document.getElementById('chips').innerHTML=
    cos.map(v=>`<button class="chip${coF===v?' on':''}" onclick="setCo('${v}')">${v}</button>`).join('')+
    `<div class="chip-sep"></div>`+
    bids.map(v=>`<button class="chip${bidF===v?' on':''}" onclick="setBid('${v}')">${v}</button>`).join('')+
    `<span class="rcount" id="rcount"></span>`;
}

function renderCard(data){
  if(!data.length)return`<div class="empty">해당하는 사업이 없습니다</div>`;
  return`<div class="cards">`+data.map(d=>`
    <div class="card ${cardCls(d.dd)}${d.bid==='NoBid'?' nobid':''}">
      <div class="card-title">${d.title}</div>
      <div class="card-right">
        <div class="dday ${ddCls(d.dd)}">D-${d.dd}</div>
        <div class="dday-dl">${d.dl.slice(5).replace('-','/')}</div>
      </div>
      <div class="card-meta">${cb(d.co)}${bb(d.bid)}${ob(d.owner)}</div>
      ${d.note?`<div class="card-note">${d.note}</div>`:''}
      ${d.link?`<a class="card-link" href="${d.link}" target="_blank" rel="noopener">🔗 ${host(d.link)}</a>`:''}
    </div>`).join('')+`</div>`;
}

function renderKanban(data){
  return`<div class="kanban">`+[
    {label:'🔴 긴급 D-3 이내',f:d=>d.dd<=3},
    {label:'🟡 임박 D-4~7',f:d=>d.dd>3&&d.dd<=7},
    {label:'🟢 여유 D-8+',f:d=>d.dd>7},
  ].map(l=>{
    const items=data.filter(l.f).sort((a,b)=>a.dd-b.dd);
    return`<div class="lane">
      <div class="lane-hdr"><span>${l.label}</span><span class="lane-cnt">${items.length}건</span></div>
      ${!items.length?`<div style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">없음</div>`
      :items.map(d=>`<div class="kcard ${cardCls(d.dd)}${d.bid==='NoBid'?' nobid':''}">
        <div class="kcard-meta">${cb(d.co)}${bb(d.bid)}</div>
        <div>${d.title}</div>
        <div class="kcard-foot"><span>${d.dl.slice(5).replace('-','/')}</span>
          <span class="kcard-dd ${ddCls(d.dd)}">D-${d.dd}</span></div>
      </div>`).join('')}
    </div>`;
  }).join('')+`</div>`;
}

function renderTimeline(data){
  const g={};
  data.sort((a,b)=>a.dd-b.dd).forEach(d=>{if(!g[d.dl])g[d.dl]=[];g[d.dl].push(d)});
  if(!Object.keys(g).length)return`<div class="empty">해당하는 사업이 없습니다</div>`;
  return Object.entries(g).map(([dl,items])=>{
    const dd=items[0].dd;
    return`<div class="tl-group">
      <div class="tl-hdr">
        <span class="tl-date">${dl}</span>
        <span class="tl-pill ${ddCls(dd)}">D-${dd}</span>
        <span class="tl-cnt">${items.length}건</span>
      </div>
      ${items.map(d=>`<div class="tl-row">
        <div class="tl-dot ${ddCls(d.dd)}"></div>
        <div class="tl-body">
          <div>${d.title}</div>
          <div class="tl-meta">${cb(d.co)}${bb(d.bid)}${ob(d.owner)}</div>
          ${d.note?`<div style="font-size:11px;color:var(--text2);margin-top:3px">${d.note}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function render(){
  const data=filtered();
  document.getElementById('main').innerHTML=
    view==='kanban'?renderKanban(data):view==='timeline'?renderTimeline(data):renderCard(data);
  const rc=document.getElementById('rcount');
  if(rc)rc.textContent=`${data.length}건`;
}

// 5분마다 자동 갱신
setInterval(load, 5*60*1000);
load();
</script>
</body>
</html>
